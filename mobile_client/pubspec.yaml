name: sail_mobile
description: "Sail - Buy & Sell Locally"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.5
  bloc: ^9.0.0

  # Network
  dio: ^5.8.0
  pretty_dio_logger: ^1.4.0
  connectivity_plus: ^6.1.4

  # Code Generation (annotations only in dependencies)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Image Handling
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Navigation
  go_router: ^14.8.1

  # UI Components
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0

  # Localization
  intl: ^0.20.2

  # Maps & Location
  google_maps_flutter: ^2.12.1
  geolocator: ^13.0.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.3

  # Utilities
  logger: ^2.6.2
  url_launcher: ^6.3.1
  rxdart: ^0.28.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^3.0.6
  json_serializable: ^6.9.4
  injectable_generator: ^2.6.3

  # Testing
  mockito: ^5.4.5
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
